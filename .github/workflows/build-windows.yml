name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: openspot-desktop

    env:
      CI: "true"
      NODE_ENV: "production"
      APP_NAME: "OpenSpot"
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_YT_API_INSTANCES: ${{ secrets.EXPO_PUBLIC_YT_API_INSTANCES }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: openspot-desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Create .env
        env:
          DOT_ENV_CONTENT: ${{ secrets.DOT_ENV_CONTENT }}
        shell: bash
        run: printf '%s' "$DOT_ENV_CONTENT" > .env

      - name: Create eas.json
        env:
          EAS_JSON_CONTENT: ${{ secrets.EAS_JSON_CONTENT }}
        shell: bash
        run: cat > eas.json <<< "$EAS_JSON_CONTENT"

      - name: Create default.json
        env:
          TAURI_DEFAULT_JSON_CONTENT: ${{ secrets.TAURI_DEFAULT_JSON_CONTENT }}
        shell: bash
        run: |
          mkdir -p src-tauri/capabilities
          cat > src-tauri/capabilities/default.json <<< "$TAURI_DEFAULT_JSON_CONTENT"

      - name: Generate Windows .ico from PNG
        shell: bash
        run: |
          choco install imagemagick -y --allow-downgrade
          magick src-tauri/icons/icon.png -define icon:auto-resize=256,128,96,64,48,32,16 src-tauri/icons/icon.ico

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: OpenSpot-MSI
          path: openspot-desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: OpenSpot-NSIS
          path: openspot-desktop/src-tauri/target/release/bundle/nsis/*.exe