name: Export Secret Files

on:
  workflow_dispatch:

jobs:
  export-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Create files from secrets
        env:
          DOT_ENV_CONTENT: ${{ secrets.DOT_ENV_CONTENT }}
          EAS_JSON_CONTENT: ${{ secrets.EAS_JSON_CONTENT }}
          TAURI_DEFAULT_JSON_CONTENT: ${{ secrets.TAURI_DEFAULT_JSON_CONTENT }}
        run: |
          mkdir -p export/src-tauri/capabilities

          printf '%s' "$DOT_ENV_CONTENT" > export/.env
          printf '%s' "$EAS_JSON_CONTENT" > export/eas.json
          printf '%s' "$TAURI_DEFAULT_JSON_CONTENT" > export/src-tauri/capabilities/default.json

      - name: Create ZIP archive
        run: |
          cd export
          zip -r ../secret-files.zip .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-files
          path: secret-files.zip
          retention-days: 1
